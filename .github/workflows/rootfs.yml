name: RootFS

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/rootfs.yml
      - apps/backend/src/code-language/compile-and-run-options/**
      - apps/judge/src/languages/compile-java.sh
      - apps/judge/src/languages/compile-python.sh
      - apps/judge/src/languages/*.ts
      - infra/sandbox-rootfs/**
      - packages/frontend/src/interfaces/CodeLanguage.ts
permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: ./infra/sandbox-rootfs/build.sh
