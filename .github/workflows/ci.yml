name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  code:
    name: Code
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  native:
    name: Native
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Check native inputs
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "native=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$BASE_SHA"
          else
            base="$BEFORE_SHA"
          fi

          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}"; then
            echo "native=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "$base" "$HEAD_SHA" -- \
            .github/workflows/ci.yml \
            .gitmodules \
            .node-version \
            package.json \
            pnpm-lock.yaml \
            pnpm-workspace.yaml \
            apps/judge/CMakeLists.txt \
            apps/judge/native \
            apps/judge/package.json \
            apps/judge/vendor/testlib \
            packages/simple-sandbox/CMakeLists.txt \
            packages/simple-sandbox/native \
            packages/simple-sandbox/package.json; then
            echo "native=false" >> "$GITHUB_OUTPUT"
          else
            echo "native=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.changes.outputs.native == 'true'
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.native == 'true'
        with:
          node-version: 24
          cache: pnpm
      - if: steps.changes.outputs.native == 'true'
        run: sudo apt-get update && sudo apt-get install --yes libfmt-dev
      - if: steps.changes.outputs.native == 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.changes.outputs.native == 'true'
        run: pnpm build:native
